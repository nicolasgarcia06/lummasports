<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo torneo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        form {
            max-width: 500px;
        }

        .campo {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .error {
            color: red;
            font-size: 0.9em;
            margin-top: 4px;
        }

        .error-box {
            color: white;
            background: crimson;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        .acciones {
            margin-top: 20px;
        }

        .acciones a {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<h1>Nuevo torneo</h1>

<div th:if="${errorNegocio}" class="error-box" th:text="${errorNegocio}"></div>

<form th:action="@{/torneos/guardar}" th:object="${torneo}" method="post">

    <div class="campo">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" th:field="*{nombre}">
        <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
    </div>

    <div class="campo">
        <label for="ciudad">Ciudad</label>
        <input type="text" id="ciudad" th:field="*{ciudad}">
        <div class="error" th:if="${#fields.hasErrors('ciudad')}" th:errors="*{ciudad}"></div>
    </div>

    <div class="campo">
        <label for="premio">Premio</label>
        <input type="number" step="0.01" id="premio" th:field="*{premio}">
        <div class="error" th:if="${#fields.hasErrors('premio')}" th:errors="*{premio}"></div>
    </div>

    <div class="campo">
        <label for="equipoCampeonId">Equipo campeón</label>
        <select id="equipoCampeonId" th:field="*{equipoCampeonId}">
            <option value="">-- Selecciona un equipo --</option>
            <option th:each="equipo : ${equipos}"
                    th:value="${equipo.id}"
                    th:text="${equipo.nombre}">
            </option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('equipoCampeonId')}" th:errors="*{equipoCampeonId}"></div>
    </div>

    <div class="acciones">
        <button type="submit">Guardar</button>
        <a th:href="@{/torneos}">Volver</a>
    </div>

</form>

</body>
</html>
